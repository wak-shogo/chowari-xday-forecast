<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>船宿別 魚種別 Xデー予測</title>
    <meta
      name="description"
      content="釣割の船宿釣果から、魚種ごとのXデー確率と予測下限・上限を日別に可視化する静的ページ。"
    />
    <link rel="stylesheet" href="./styles.css?v=20260401-balanced1" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <p class="credit">作:データアングラー</p>
        <p class="eyebrow">釣割 船宿別予測</p>
        <h1 id="title">読込中</h1>
        <div class="meta">
          <span id="generatedAt">読込中</span>
          <span id="summaryMeta">-</span>
        </div>
      </header>

      <section class="chooser">
        <div class="tab-row" role="tablist" aria-label="表示モード">
          <button class="tab-button is-active" id="shipTab" type="button" data-view="ship" role="tab" aria-selected="true">
            船別
          </button>
          <button class="tab-button" id="aggregateTab" type="button" data-view="aggregate" role="tab" aria-selected="false">
            魚種統合
          </button>
        </div>
        <div class="chooser-grid">
          <label class="select-card" for="shipSelect" id="shipSelectCard">
            <span>船宿</span>
            <select id="shipSelect"></select>
          </label>
          <label class="select-card" for="speciesSelect" id="speciesSelectCard">
            <span>魚種</span>
            <select id="speciesSelect"></select>
          </label>
        </div>
      </section>

      <section class="top-days" id="topDays" aria-label="注目日"></section>

      <section class="sim-panel">
        <div class="sim-head">
          <span>予測シミュレーター</span>
          <span id="simHint">即時計算</span>
        </div>
        <div class="sim-grid">
          <div class="sim-controls">
            <label class="slider-card" for="airSlider">
              <span>気温</span>
              <strong id="airValue">-</strong>
              <input id="airSlider" type="range" />
            </label>
            <label class="slider-card" for="seaSlider">
              <span>水温</span>
              <strong id="seaValue">-</strong>
              <input id="seaSlider" type="range" />
            </label>
            <label class="slider-card" for="moonSlider">
              <span>月齢</span>
              <strong id="moonValue">-</strong>
              <input id="moonSlider" type="range" />
            </label>
          </div>

          <div class="sim-metrics">
            <article class="metric-card">
              <span>Xデー確率</span>
              <strong id="simProbability">-</strong>
            </article>
            <article class="metric-card">
              <span id="minMetricLabel">予測下限数</span>
              <strong id="simMin">-</strong>
            </article>
            <article class="metric-card">
              <span id="maxMetricLabel">予測上限数</span>
              <strong id="simMax">-</strong>
            </article>
          </div>
        </div>
      </section>

      <details class="observed-panel fold-panel" id="evaluationPanel">
        <summary class="fold-summary">
          <span id="evaluationLabel">yyプロット</span>
          <span id="evaluationMeta">タップして表示</span>
        </summary>
        <div class="evaluation-layout fold-body">
          <div class="chart-scroller evaluation-chart-wrap">
            <canvas id="yyChart" width="920" height="420" aria-label="予測上限のyyプロット"></canvas>
          </div>
        </div>
      </details>

      <section class="chart-panel compact">
        <div class="chart-header">
          <span>海水温 × 月齢マップ</span>
          <span id="surfaceMeta">気温 - で固定</span>
        </div>
        <div class="surface-wrap">
          <canvas id="surfaceMap" width="1200" height="540" aria-label="海水温と月齢の予測マップ"></canvas>
          <div class="tooltip surface-tooltip" id="surfaceTooltip" hidden></div>
        </div>
      </section>

      <section class="observed-panel" id="rankingPanel" hidden>
        <div class="chart-header">
          <span id="rankingLabel">船宿ランキング</span>
          <span id="rankingMeta">-</span>
        </div>
        <div class="observed-grid" id="rankingList" aria-label="船宿ランキング一覧"></div>
      </section>

      <section class="chart-panel">
        <div class="chart-header">
          <span id="rangeLabel">-</span>
          <span id="todayLabel">-</span>
        </div>
        <div class="chart-scroller" id="probChartScroller">
          <canvas id="probChart" width="2500" height="520" aria-label="Xデー確率グラフ"></canvas>
          <div class="tooltip" id="probTooltip" hidden></div>
        </div>
      </section>

      <section class="chart-panel compact">
        <div class="chart-header">
          <span id="minChartLabel">予測下限数</span>
          <span id="unitLabelMin">-</span>
        </div>
        <div class="chart-scroller" id="minChartScroller">
          <canvas id="minChart" width="2500" height="360" aria-label="予測下限数グラフ"></canvas>
          <div class="tooltip" id="minTooltip" hidden></div>
        </div>
      </section>

      <section class="chart-panel compact">
        <div class="chart-header">
          <span id="maxChartLabel">予測上限数</span>
          <span id="unitLabelMax">-</span>
        </div>
        <div class="chart-scroller" id="maxChartScroller">
          <canvas id="maxChart" width="2500" height="360" aria-label="予測上限数グラフ"></canvas>
          <div class="tooltip" id="maxTooltip" hidden></div>
        </div>
      </section>

      <section class="observed-panel">
        <div class="observed-header">
          <div class="chart-header">
            <span id="observedLabel">前年釣果実績</span>
            <span id="observedMeta">-</span>
          </div>
          <label class="sort-card" for="observedSort">
            <span>並び替え</span>
            <select id="observedSort">
              <option value="date">日付順</option>
              <option value="catch">釣果順</option>
            </select>
          </label>
        </div>
        <div class="observed-grid" id="observedList" aria-label="前年釣果実績一覧"></div>
      </section>

      <footer class="foot">
        <span>釣割 釣果データ</span>
        <span>Open-Meteo 気象・海況データ</span>
        <a href="https://x.com/data_angler?s=20" target="_blank" rel="noreferrer">Xアカウント</a>
      </footer>
    </main>
    <script src="./script.js?v=20260401-balanced1" type="module"></script>
  </body>
</html>
